name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build SDK
        run: npm run build --workspace=packages/ton

      - name: Typecheck SDK
        run: npx tsc --project packages/ton/tsconfig.json --noEmit

      - name: Typecheck Server
        run: npx tsc --project server/tsconfig.json --noEmit

      - name: Test SDK
        run: npx vitest run --config packages/ton/vitest.config.ts --dir packages/ton

      - name: Test Server
        run: npx vitest run --config server/vitest.config.ts

      - name: Verify pack output
        run: cd packages/ton && npm pack --dry-run
